<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Anime Corner</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <h1>Anime Corner</h1>
        <blockquote id="quote">Loading...</blockquote>
        <div class="char" id="char"></div>
        <button onclick="getQuote()">New Quote</button>
    </div>
    <div class="card">
        <h2 style="margin-top: 0">Add a Quote</h2>
        <input id="newText" type="text" placeholder="Quote text">
        <input id="newChar" type="text" placeholder="Character">
        <button onclick="addQuote()">Add</button>
        <div id="addMsg"></div>
    </div>

    <h2>All Quotes</h2>
    <div class="list" id="list"></div>

    <script>
        async function getQuote() {
            try {
                const res = await fetch("/api/quote");
                const data = await res.json();
                document.getElementById("quote").textContent = '"' + data.text + '"';
                document.getElementById("char").textContent = "— " + data.char;
            } catch (e) {
                document.getElementById("quote").textContent = "Could not load quote.";
            }
        }

        async function getAllQuotes() {
            try {
                const res = await fetch("/api/quotes");
                const data = await res.json();
                const list = document.getElementById("list");
                list.innerHTML = "";
                data.forEach(q => {
                    const div = document.createElement("div");
                    div.className = "list-item";
                    div.innerHTML = '<blockquote>"' + q.text + '"</blockquote>' +
                        '<div class="char">— ' + q.char + '</div>' +
                        '<button class="del" onclick="deleteQuote(' + q.id + ')">x</button>';
                    list.appendChild(div);
                });
            } catch (e) {
                document.getElementById("list").textContent = "Could not load quotes.";
            }
        }

        async function addQuote() {
            const text = document.getElementById("newText").value.trim();
            const char = document.getElementById("newChar").value.trim();
            const msg = document.getElementById("addMsg");
            if (!text || !char) {
                msg.textContent = "Please fill in both fields."
                return;
            }
            try {
                const res = await fetch("/api/quotes", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ text, char })
                });
                if (!res.ok) throw new Error();
                document.getElementById("newText").value = "";
                document.getElementById("newChar").value = "";
                msg.textContent = "Added!";
                getAllQuotes();

            } catch (e) {
                msg.textContent = "Could not add quote."
            }
        }

        async function deleteQuote(id) {
            try {
                const res = await fetch("/api/quotes/" + id, { method: "DELETE" });
                if (!res.ok) throw new Error();
                getAllQuotes();
            } catch (e) {
                alert("Could not delete quote.");
            }
        }

        getQuote();
        getAllQuotes();
    </script>
</body>

</html>
