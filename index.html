<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Anime Corner</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <h1>Anime Corner</h1>
        <blockquote id="quote">Loading...</blockquote>
        <div class="char" id="char"></div>
        <button onclick="getQuote()">New Quote</button>
    </div>
    <div class="card">
        <h2 style="margin-top: 0">Add a Quote</h2>
        <input id="newText" type="text" placeholder="Quote text">
        <select id="newChar"></select>
        <button onclick="addQuote()">Add</button>
        <div id="addMsg"></div>
    </div>

    <h2>All Quotes</h2>
    <input id="search" type="text" placeholder="Search quotes or characters..." oninput="filterQuotes()">

    <div class="list" id="list"></div>

    <h2>Characters</h2>
    <div class="card">
        <input id="newName" type="text" placeholder="Character name">
        <input id="newAnime" type="text" placeholder="Anime">
        <button onclick="addCharacter()">Add Character</button>
        <div id="charMsg"></div>
    </div>
    <div class="list" id="charList"></div>

    <script>
        let allQuotes = [];

        async function getQuote() {
            try {
                const res = await fetch("/api/quote");
                const data = await res.json();
                document.getElementById("quote").textContent = '"' + data.text + '"';
                document.getElementById("char").textContent = "— " + data.char;
            } catch (e) {
                document.getElementById("quote").textContent = "Could not load quote.";
            }
        }

        async function getAllQuotes() {
            try {
                const res = await fetch("/api/quotes");
                allQuotes = await res.json();
                renderQuotes(allQuotes);
            } catch (e) {
                document.getElementById("list").textContent = "Could not load quotes.";
            }
        }

        async function addQuote() {
            const text = document.getElementById("newText").value.trim();
            const select = document.getElementById("newChar");
            const char = select.options[select.selectedIndex]?.dataset.name || "";
            const character_id = select.value || null;
            const msg = document.getElementById("addMsg");
            if (!text || !char) {
                msg.textContent = "Please enter text and select a character."
                return;
            }
            try {
                const res = await fetch("/api/quotes", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ text, char, character_id })
                });
                if (!res.ok) throw new Error();
                document.getElementById("newText").value = "";
                select.selectedIndex = 0;
                msg.textContent = "Added!";
                getAllQuotes();

            } catch (e) {
                msg.textContent = "Could not add quote."
            }
        }

        async function deleteQuote(id) {
            try {
                const res = await fetch("/api/quotes/" + id, { method: "DELETE" });
                if (!res.ok) throw new Error();
                getAllQuotes();
            } catch (e) {
                alert("Could not delete quote.");
            }
        }

        function renderQuotes(quotes) {
            const list = document.getElementById("list");
            list.innerHTML = "";
            if (quotes.length === 0) {
                list.innerHTML = '<div class="list-item">No matches found.</div>';
                return;
            }
            quotes.forEach(q => {
                const div = document.createElement("div");
                div.className = "list-item";
                div.innerHTML = '<blockquote>"' + q.text + '"</blockquote>' +
                    '<div class="char">-' + q.char + '</div>' +
                    '<button class="del" onclick="deleteQuote(' + q.id + ')">x</button>';
                list.appendChild(div);
            });
        }

        function filterQuotes() {
            const term = document.getElementById("search").value.toLowerCase();
            const filtered = allQuotes.filter(q =>
                q.text.toLowerCase().includes(term) ||
                q.char.toLowerCase().includes(term)
            );
            renderQuotes(filtered);
        }

        async function getCharacters() {
            try {
                const res = await fetch("/api/characters");
                const data = await res.json();
                const list = document.getElementById("charList");
                list.innerHTML = "";
                data.forEach(c => {
                    const div = document.createElement("div");
                    div.className = "list-item";
                    div.innerHTML = '<blockquote>' + c.name + '</blockquote>' + '<div class="char">' + c.anime + '</div>' + '<button class="del" onclick="deleteCharacter(' + c.id + ')">x</button>';
                    list.appendChild(div);
                });
                fillCharacterDropdown(data);
            } catch (e) {
                document.getElementById("charList").textContent = "Could not load characters.";
            }
        }

        async function addCharacter() {
            const name = document.getElementById("newName").value.trim();
            const anime = document.getElementById("newAnime").value.trim();
            const msg = document.getElementById("charMsg");
            if (!name || !anime) { msg.textContent = "Please fill in both fields."; return; }
            try {
                const res = await fetch("/api/characters", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, anime })
                });
                if (!res.ok) throw new Error();
                document.getElementById("newName").value = "";
                document.getElementById("newAnime").value = "";
                msg.textContent = "Added!";
                getCharacters();
            } catch (e) {
                msg.textContent = "Could not add character.";
            }
        }

        async function deleteCharacter(id) {
            try {
                const res = await fetch("/api/characters/" + id, { method: "DELETE" });
                if (!res.ok) throw new Error();
                getCharacters();
            } catch (e) {
                alert("Could not delete character.");
            }
        }

        function fillCharacterDropdown(characters) {
            const select = document.getElementById("newChar");
            select.innerHTML = '<option value="">Select a character...</option>';
            characters.forEach(c => {
                const opt = document.createElement("option");
                opt.value = c.id;
                opt.textContent = c.name;
                opt.dataset.name = c.name;
                select.appendChild(opt);
            });
        }

        getQuote();
        getAllQuotes();
        getCharacters();
    </script>
</body>

</html>
